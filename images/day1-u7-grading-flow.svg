<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#546e7a"/>
    </marker>
  </defs>
  <rect width="1200" height="780" fill="#f7f9fb"/>
  <text x="600" y="46" font-size="26" font-weight="800" fill="#263238" text-anchor="middle">AI 輔助評分整合流程（Human in the Loop）</text>

  <!-- 階段一框 -->
  <rect x="48" y="100" width="1104" height="190" rx="16" fill="none" stroke="#26a69a" stroke-width="2" stroke-dasharray="10 7" opacity="0.75"/><rect x="66" y="85" width="468" height="30" rx="15" fill="#26a69a"/><text x="300" y="101" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="middle">階段一：評分標準生成器（Rubric 整學期可重用）</text>
  <rect x="80" y="151" width="240" height="78" rx="39" fill="#e0f2f1" stroke="#26a69a" stroke-width="2.5"/><text x="200" y="179.2" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">課綱／</text><text x="200" y="200.79999999999998" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">作業說明</text>
  <line x1="322" y1="190" x2="458" y2="190" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="460" y="148" width="260" height="84" rx="8" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2.5"/><text x="590" y="179.2" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">AI 生成</text><text x="590" y="200.79999999999998" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">評分標準 Rubric</text>
  <line x1="722" y1="190" x2="856" y2="190" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <polygon points="980,127 1100,190 980,253 860,190" fill="#fff3e0" stroke="#fb8c00" stroke-width="3"/><text x="980" y="179.875" font-size="15" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">老師確認／修改</text><text x="980" y="200.125" font-size="15" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">→ 定稿 Rubric</text><circle cx="980" cy="109" r="14" fill="#fb8c00"/><text x="980" y="110" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" dominant-baseline="middle">★1</text><text x="980" y="87" font-size="13" fill="#fb8c00" font-weight="700" text-anchor="middle" dominant-baseline="middle">HITL 檢查點</text>

  <!-- 階段交接：定稿 Rubric 帶入階段二 -->
  
  <path d="M 980 254 L 980 452" fill="none" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="994" y="330" font-size="14" fill="#607d8b" font-weight="700" text-anchor="start">定稿 Rubric 帶入</text>

  <!-- 階段二框 -->
  <rect x="48" y="385" width="1104" height="250" rx="16" fill="none" stroke="#1e88e5" stroke-width="2" stroke-dasharray="10 7" opacity="0.75"/><rect x="66" y="370" width="366" height="30" rx="15" fill="#1e88e5"/><text x="249" y="386" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="middle">階段二：作業評分工作流（每份作業跑一次）</text>
  <rect x="905" y="464" width="250" height="92" rx="46" fill="#e0f2f1" stroke="#26a69a" stroke-width="2.5"/><text x="1030" y="499.2" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">貼上定稿 Rubric</text><text x="1030" y="520.8" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">＋上傳學生作業</text>
  <line x1="902" y1="510" x2="872" y2="510" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="610" y="462" width="260" height="96" rx="8" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2.5"/><text x="740" y="488.4" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">AI 依 Rubric 逐項分析</text><text x="740" y="510" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">證據引用＋建議分數</text><text x="740" y="531.6" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">→ 評分報告草稿</text>
  <line x1="608" y1="510" x2="574" y2="510" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <polygon points="450,445 570,510 450,575 330,510" fill="#fff3e0" stroke="#fb8c00" stroke-width="3"/><text x="450" y="499.875" font-size="15" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">老師核定：</text><text x="450" y="520.125" font-size="15" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">核可／調分</text><circle cx="450" cy="427" r="14" fill="#fb8c00"/><text x="450" y="428" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" dominant-baseline="middle">★2</text><text x="450" y="405" font-size="13" fill="#fb8c00" font-weight="700" text-anchor="middle" dominant-baseline="middle">HITL 檢查點</text>
  <line x1="328" y1="510" x2="288" y2="510" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/><text x="308" y="500" font-size="13" fill="#607d8b" font-weight="600" text-anchor="middle">定稿</text>
  <polygon points="57,464 263,464 285,510 263,556 57,556 35,510" fill="#e8f5e9" stroke="#43a047" stroke-width="3"/><text x="160" y="499.2" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">最終評分報告</text><text x="160" y="520.8" font-size="16" fill="#263238" font-weight="600" text-anchor="middle" dominant-baseline="middle">＋老師簽核紀錄</text>

  <!-- 退回迴圈（虛線）：老師核定 → AI 逐項分析 -->
  <path d="M 450 577 L 450 618 L 740 618 L 740 562" fill="none" stroke="#546e7a" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arr)"/>
  <text x="595" y="610" font-size="13" fill="#607d8b" font-weight="600" text-anchor="middle">退回：補充觀察後重新分析</text>

  <!-- mini legend -->
  <g transform="translate(180, 714)">
    <rect x="0" y="0" width="76" height="30" rx="15" fill="#e0f2f1" stroke="#26a69a" stroke-width="2"/>
    <text x="100" y="16" font-size="13" fill="#607d8b" dominant-baseline="middle">資料輸入</text>
    <rect x="185" y="0" width="76" height="30" rx="6" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
    <text x="290" y="16" font-size="13" fill="#607d8b" dominant-baseline="middle">AI 處理</text>
    <polygon points="405,0 445,15 405,30 365,15" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
    <text x="518" y="16" font-size="13" fill="#607d8b" dominant-baseline="middle">老師決策（HITL）</text>
    <polygon points="635,0 695,0 707,15 695,30 635,30 623,15" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
    <text x="755" y="16" font-size="13" fill="#607d8b" dominant-baseline="middle">定稿產出</text>
  </g>
</svg>