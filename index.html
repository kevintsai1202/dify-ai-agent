  <script src="course-data.js"></script>
  <script>
  /* ============================================================
   * Storage & State Management
   * ============================================================ */
  const STORE_KEY = 'dify_ai_agent_workshop_state_v1';
  const store = {
    load() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { tasks: {}, quiz: {}, currentQuizIndex: 0 }; }
      catch { return { tasks: {}, quiz: {}, currentQuizIndex: 0 }; }
    },
    save(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); },
    reset() { localStorage.removeItem(STORE_KEY); }
  };
  let state = store.load();

  /* ============================================================
   * DOM Utilities
   * ============================================================ */
  const el = (tag, attrs = {}, ...children) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') node.className = v;
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if (v !== false && v != null) node.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      node.append(c instanceof Node ? c : document.createTextNode(String(c)));
    }
    return node;
  };
  const clear = (node) => { while (node.firstChild) node.removeChild(node.firstChild); };

  /* ============================================================
   * Markdown Inline Helper (XSS Safe)
   * ============================================================ */
  function inlineMarkdown(str) {
    const div = el('div', { class: 'lecture-markdown-body' });
    if (!str) return div;

    // Helper for formatting inline markdown
    function parseInline(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
    }

    const lines = str.split('\n');
    let html = [];
    let inList = false;
    let inQuote = false;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const trimmed = line.trim();

      // Horizontal rule
      if (trimmed === '---') {
        if (inList) { html.push('</ul>'); inList = false; }
        if (inQuote) { html.push('</blockquote>'); inQuote = false; }
        html.push('<hr class="lecture-hr">');
        continue;
      }

      // Headers (### or ####)
      const headerMatch = line.match(/^(#{3,6})\s+(.*)$/);
      if (headerMatch) {
        if (inList) { html.push('</ul>'); inList = false; }
        if (inQuote) { html.push('</blockquote>'); inQuote = false; }
        const level = headerMatch[1].length;
        const titleText = parseInline(headerMatch[2]);
        html.push(`<h${level} class="lecture-h${level}">${titleText}</h${level}>`);
        continue;
      }

      // Blockquotes (>)
      const quoteMatch = line.match(/^(\s*)>\s*(.*)$/);
      if (quoteMatch) {
        if (inList) { html.push('</ul>'); inList = false; }
        if (!inQuote) {
          html.push('<blockquote class="lecture-quote">');
          inQuote = true;
        }
        const quoteContent = parseInline(quoteMatch[2]);
        html.push(`<p>${quoteContent}</p>`);
        continue;
      } else {
        if (inQuote && trimmed !== '') {
          html.push('</blockquote>');
          inQuote = false;
        }
      }

      // Unordered lists (* or -)
      const listMatch = line.match(/^(\s*)([*+-])\s+(.*)$/);
      if (listMatch) {
        const indent = listMatch[1].length;
        const itemText = parseInline(listMatch[3]);

        if (!inList) {
          html.push('<ul class="lecture-list">');
          inList = true;
        }

        if (indent > 0) {
          html.push(`<li class="lecture-list-item indent-1">${itemText}</li>`);
        } else {
          html.push(`<li class="lecture-list-item">${itemText}</li>`);
        }
        continue;
      } else {
        if (inList && trimmed !== '' && !line.startsWith(' ')) {
          html.push('</ul>');
          inList = false;
        }
      }

      // Empty line closes open list/quote
      if (trimmed === '') {
        if (inList) { html.push('</ul>'); inList = false; }
        if (inQuote) { html.push('</blockquote>'); inQuote = false; }
        continue;
      }

      // Regular text paragraph
      if (!inList && !inQuote) {
        html.push(`<p class="lecture-p">${parseInline(line)}</p>`);
      }
    }

    if (inList) html.push('</ul>');
    if (inQuote) html.push('</blockquote>');

    div.innerHTML = html.join('\n');
    return div;
  }

  /* ============================================================
   * Routing & Navigation
   * ============================================================ */
  function scrollToSection(id) {
    const target = document.getElementById(id);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth' });
      // Update sidebar active status
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-target') === id) {
          link.classList.add('active');
        }
      });
      // Update topbar trail
      const label = document.querySelector(`.nav-link[data-target="${id}"]`).textContent.trim();
      const trail = document.getElementById('topbarTrail');
      clear(trail);
      trail.append('課程大綱 > ', el('b', {}, label));
    }
  }

   * Render overview
   * ============================================================ */
  function renderOverview(meta) {
    const root = el('section', { class: 'chapter', id: 'overview' });
    
    const header = el('header', {});
    header.append(el('span', { class: 'chapter-num' }, 'WELCOME'));
    header.append(el('h1', {}, meta.title));
    root.append(header);

    const desc = el('div', { class: 'lead' }, '本工作坊專為設計與時尚相關科系教師規劃，引導教師在無程式背景下，使用網頁版 Claude、Canva MCP 與 Dify 工作流 WebApp 完成備課、簡報與教學活動設計。');
    root.append(desc);

    return root;
  }

  /* ============================================================
   * Render shared case
   * ============================================================ */
  function renderSharedCase(sc) {

    const header = el('header', {});
    header.append(el('span', { class: 'chapter-num' }, 'CASE STUDY'));
    header.append(el('h2', {}, sc.title));
    root.append(header);

    const bento = el('div', { class: 'concept-grid' });
    
    const block1 = el('div', { class: 'concept' });
    block1.append(el('div', { class: 'concept-heading' }, '背景脈絡'));
    block1.append(el('div', { class: 'concept-body' }, sc.background));
    bento.append(block1);

    const block2 = el('div', { class: 'concept' });
    block2.append(el('div', { class: 'concept-heading' }, '核心待解決問題'));
    block2.append(el('div', { class: 'concept-body' }, sc.coreProblem));
    bento.append(block2);

    root.append(bento);

    const rtfc = el('div', { class: 'rtfc-panel' });
    rtfc.append(el('div', { class: 'rtfc-title' }, 'RTFC 提示詞框架說明'));
    const list = el('ul', { class: 'rtfc-list' });
    list.append(el('li', {}, el('strong', {}, 'R (Role - 角色)：'), '設定 AI 專業身份（例如「教學設計專家」），以確保對答符合特定專業視角與口吻。'));
    list.append(el('li', {}, el('strong', {}, 'T (Task - 任務)：'), '指明具體要執行的任務（例如「產生教案草稿、討論題與評分標準說明」）。'));
    list.append(el('li', {}, el('strong', {}, 'F (Format - 格式)：'), '規定結果的產出格式（例如「具備結構化標題與項目符號的內容」）。'));
    list.append(el('li', {}, el('strong', {}, 'C (Context - 背景)：'), '提供關鍵的背景與限制（例如「適用於無資訊背景的大一新生，需包含 40 分鐘實作」）。'));
    rtfc.append(list);
    root.append(rtfc);

    return root;
  }

  /* ============================================================
   * Render Dify dual knowledge flow diagram
   * ============================================================ */
  function renderDifyKnowledgeFlow() {

    const header = el('header', {});
    header.append(el('span', { class: 'chapter-num' }, 'DIFY'));
    header.append(el('h2', {}, 'Dify 知識庫與工作流設計'));
    root.append(header);

    root.append(el('div', { class: 'lead' }, '第三、四小時的 Dify 重點包含兩件事：先理解 RAG 如何把教材變成可檢索的知識，再理解講師預建的 WebApp 如何同時引用院級知識與老師個人教材，最後由 LLM 合併成可修改的備課成果。'));

    root.append(el('h4', {}, 'Dify RAG 檢索增強生成流程'));

    ragImage.append(el('img', {
      src: 'images/dify-rag-flow-image2.png',

      class: 'flow-image'
    }));

    flowImage.append(el('img', {
      src: 'images/dify-dual-knowledge-flow-image2.png',
      alt: 'Dify 雙知識庫合併輸出流程圖：課程主題輸入、院級共用知識庫、老師個人知識庫、雙路檢索、LLM 合併與設計思考輸出',
      class: 'flow-image'
    }));
    flowImage.append(el('figcaption', { class: 'illustration-caption' }, 'image2 繪製的 Dify 雙知識庫與 LLM 合併輸出流程圖'));
    root.append(flowImage);

    const guardrails = el('div', { class: 'concept-grid' });

    g1.append(el('div', { class: 'concept-heading' }, '資料放置原則'));
    g1.append(el('div', { class: 'concept-body' }, '院級庫放全院共享、可被多位老師重複使用的資料；個人庫只放單一老師課程脈絡與個人教材，避免混在一起造成權限與語境混亂。'));

    g2.append(el('div', { class: 'concept-body' }, '若院級規範與個人教材出現差異，輸出需標示差異並優先遵守院級規範；個人教材用來補足範例、活動細節與課堂語氣。'));
    guardrails.append(g1, g2);
    root.append(guardrails);

    return root;
  }

  /* ============================================================
   * Render Task Item
   * ============================================================ */
  function renderTask(t, unitId) {
    const checked = !!state.tasks[t.id];
    const li = el('li', {
      class: 'task-item' + (checked ? ' done' : ''),
      onclick: () => toggleTask(t.id, li, unitId)
    });
    li.append(el('div', { class: 'task-checkbox' }, '✓'));
    li.append(el('div', { class: 'task-label' }, t.text));
    return li;
  }

  function toggleTask(id, li, unitId) {
    if (state.tasks[id]) {
      delete state.tasks[id];
      li.classList.remove('done');
    } else {
      state.tasks[id] = true;
      li.classList.add('done');
    }
    store.save(state);
    updateProgressUI();
    updateUnitProgressPill(unitId);
  }

  function updateUnitProgressPill(unitId) {
    const u = window.COURSE.day1.units.find(x => x.id === unitId);
    if (!u) return;
    const total = u.tasks.length;
    const completed = u.tasks.filter(t => state.tasks[t.id]).length;
    const pill = document.querySelector(`#pill-${unitId}`);
    if (pill) {
      pill.textContent = `${completed} / ${total}`;
    }
  }

  /* ============================================================
   * Copyable Prompts Card
   * ============================================================ */
  function renderPromptCard(p) {
    const card = el('div', { class: 'prompt-card' });
    const head = el('div', { class: 'prompt-card-head' });
    head.append(el('div', { class: 'prompt-card-title' }, p.title));
    
    const copyBtn = el('button', { class: 'prompt-copy-btn', type: 'button' }, '複製提示詞');
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(p.body);
        copyBtn.textContent = '已複製✓';
        copyBtn.classList.add('ok');
        setTimeout(() => {
          copyBtn.textContent = '複製提示詞';
          copyBtn.classList.remove('ok');
        }, 1500);
      } catch (err) {
        alert('複製失敗，請手動複製！');
      }
    });
    head.append(copyBtn);
    card.append(head);
    card.append(el('pre', { class: 'prompt-text' }, p.body));
    return card;
  }

  /* ============================================================
   * Modal Material Preview（頁內 iframe，支援 md/html/pdf）
   * ============================================================ */
  /**
   * 依副檔名決定 iframe 要載入的來源
   * - pdf / html / htm：直接餵檔案路徑，交給瀏覽器內建檢視器渲染
   * - 其餘（md/csv/yaml/yml/txt/json…）：走 viewer.html?file= 做美化渲染
   * @param {string} filePath 素材檔相對路徑
   * @returns {string} iframe 的 src
   */
  function resolveViewerSrc(filePath) {
    const ext = (filePath.split('.').pop() || '').toLowerCase();
    if (ext === 'pdf' || ext === 'html' || ext === 'htm') return filePath;
    return `viewer.html?file=${encodeURIComponent(filePath)}`;
  }

  /**
   * 開啟素材預覽浮層
   * @param {string} fileName 素材檔名（相對於 course-package/materials/）
   */
  function openMaterialModal(fileName) {
    const modal = document.getElementById('materialModal');
    const title = document.getElementById('modalTitle');
    const frame = document.getElementById('modalFrame');
    const newTab = document.getElementById('modalNewTab');

    const filePath = `course-package/materials/${fileName}`;
    const src = resolveViewerSrc(filePath);

    title.textContent = fileName;
    newTab.href = src;
    frame.src = src;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden'; // 鎖背景捲動
  }

  /** 關閉素材浮層並清空 iframe（釋放 PDF/HTML 背景資源） */
  function closeMaterialModal() {
    const modal = document.getElementById('materialModal');
    if (!modal.classList.contains('open')) return;
    modal.classList.remove('open');
    document.getElementById('modalFrame').src = 'about:blank';
    document.body.style.overflow = '';
  }

  function renderMaterialRow(m) {
    const row = el('div', { class: 'material-row' });
    row.append(el('span', { class: 'material-tag' }, m.type));
    
    const center = el('div', {});
    const link = el('a', { href: 'javascript:;', onclick: () => openMaterialModal(m.name) }, m.name);
    center.append(el('div', { class: 'material-name' }, link));
    center.append(el('div', { class: 'material-desc' }, m.desc));
    row.append(center);
    
    row.append(el('span', { class: 'material-meta' }, 'materials/'));
    return row;
  }

  /* ============================================================
   * Color Swatches Render
   * ============================================================ */

    // We add beautiful custom swatches for color trend units
    if (unitId === 'd1-u4') {
      // 2026 Colors
      const colors = [
        { hex: '#004F54', name: '變革藍綠色', text: '#ffffff' },
        { hex: '#F4F1EA', name: '雲舞白', text: '#141e1e' },
        { hex: '#EE9B00', name: '金合歡黃', text: '#141e1e' },
        { hex: '#E5989B', name: '粉黛色', text: '#141e1e' },
        { hex: '#CA6702', name: '茶玫瑰', text: '#ffffff' }
      ];
      colors.forEach(c => {

          class: 'illustration-box', 
          style: `background: ${c.hex}; color: ${c.text}; flex:1; height: 60px; font-size:11px; display:flex; flex-direction:column; justify-content:center; align-items:center;`

      // Design Tokens swatches
      const colors = [
        { hex: '#004F54', name: 'Primary', text: '#ffffff' },
        { hex: '#F4F1EA', name: 'Secondary', text: '#141e1e' },
        { hex: '#EE9B00', name: 'Accent', text: '#141e1e' },
        { hex: '#141E1E', name: 'Text Dark', text: '#ffffff' }
      ];
      colors.forEach(c => {
        const item = el('div', { 
          class: 'illustration-box', 
          style: `background: ${c.hex}; color: ${c.text}; flex:1; height: 60px; font-size:11px; display:flex; flex-direction:column; justify-content:center; align-items:center;`
        });
        item.append(el('div', { style: 'font-weight:bold;' }, c.name));
        item.append(el('div', { style: 'opacity:0.8; font-family:monospace;' }, c.hex));
        container.append(item);
      });
    } else {
      // Placeholder for other units
      const item = el('div', { 
        class: 'illustration-box', 
        style: 'background: var(--surface-2); color: var(--muted); flex:1; height: 50px; font-size:12px; display:grid; place-items:center;'
      }, '圖片預留位置 (SVG/PNG)');
      container.append(item);
    }

  /* ============================================================
   * Render Unit detail
   * ============================================================ */
  function renderUnit(day, u) {
    const details = el('details', { class: 'unit', id: `${day.id}-${u.id}`, open: true });
    
    const summary = el('summary', {});
    const titleWrap = el('div', { class: 'unit-title-wrap' });
    titleWrap.append(el('div', { class: 'unit-title' }, u.title));
    titleWrap.append(el('div', { class: 'unit-meta' }, `${u.id}  |  時段：${u.timeRange}`));
    summary.append(titleWrap);
    
    // Progress pill
    const completed = u.tasks.filter(t => state.tasks[t.id]).length;
    summary.append(el('span', { class: 'unit-progress-pill', id: `pill-${u.id}` }, `${completed} / ${u.tasks.length}`));
    details.append(summary);

    const body = el('div', { class: 'unit-body' });
    
    // Goals
    body.append(el('h4', {}, '單元學習目標'));
    const goalsList = el('ul', { class: 'goals-list' });
    u.goals.forEach(g => goalsList.append(el('li', {}, g)));
    body.append(goalsList);

    // Color Swatches / Visual Spec (Only for specific color trend/token units)
    if (u.id === 'd1-u4' || u.id === 'd1-u5') {
      body.append(el('h4', {}, '視覺與設計樣式 (Color Swatch)'));
      body.append(renderColorSwatches(u.id));
    }

    // Illustrations / Screenshot Spec (Render generated course images)
    if (u.illustrations && u.illustrations.length) {
      body.append(el('h4', {}, '實作情境與畫面插圖 (Illustration)'));
      const illContainer = el('div', { class: 'illustration' });
      u.illustrations.forEach(ill => {
        const imgPath = `images/${ill.name}`;
        const img = el('img', { 
          src: imgPath, 
          alt: ill.alt, 
          class: 'illustration-img',
          style: 'max-width: 100%; height: auto; border-radius: var(--r-md); border: 1px solid var(--border-strong); box-shadow: var(--shadow-lift); margin: 8px 0;'
        });
        illContainer.append(img);
        illContainer.append(el('div', { class: 'illustration-caption', style: 'font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 16px;' }, `${ill.alt} — ${ill.spec}`));
      });
      body.append(illContainer);
    }

    // Formatted Lecture content from content.md matching this unit
    body.append(el('h4', {}, '講義與實作引導'));
    const lectureContainer = el('div', { class: 'concept-body', style: 'margin-bottom: 20px;' });
    
    // Fetch and show excerpt from day1/content.md dynamically or use structured descriptions
    // To make sure this works without network latency, we will inline the core descriptions
    // as concepts below or fetch day1/content.md and find ## u-n section.
    // Let's create an elegant fallback: we fetch day1/content.md.
    const lectureContentBox = el('div', { id: `lecture-${u.id}`, style: 'font-size:14.5px; border-left:2px solid var(--accent); padding-left:14px;' }, '講義內容加載中...');
    lectureContainer.append(lectureContentBox);
    body.append(lectureContainer);

    // Prompts
    if (u.prompts && u.prompts.length) {
      body.append(el('h4', {}, '複製提示詞 (RTFC Prompts)'));
      u.prompts.forEach(p => body.append(renderPromptCard(p)));
    }

    // Tasks list
    if (u.tasks && u.tasks.length) {
      body.append(el('h4', {}, '單元實作檢核清單'));
      const tList = el('ul', { class: 'task-list' });
      u.tasks.forEach(t => tList.append(renderTask(t, u.id)));
      body.append(tList);
    }

    // Materials
    if (u.materials && u.materials.length) {
      body.append(el('h4', {}, '單元教材與範本檔'));
      const mList = el('div', { class: 'materials' });
      u.materials.forEach(m => mList.append(renderMaterialRow(m)));
      body.append(mList);
    }

    details.append(body);
    return details;
  }

  /* ============================================================
   * Fetch Lecture content
   * ============================================================ */
  function fetchAndPopulateLectures() {
    fetch('course-package/day1/content.md')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load content');
        return r.text();
      })
      .then(text => {
        // We parse ## u-1 to ## u-9
        const units = window.COURSE.day1.units;
        units.forEach((u, index) => {
          const nextUId = index < units.length - 1 ? `## u-${index + 2}` : null;
          const uPattern = `## u-${index + 1}`;
          
          let startIndex = text.indexOf(uPattern);
          if (startIndex !== -1) {
            let endIndex = nextUId ? text.indexOf(nextUId, startIndex + uPattern.length) : text.length;
            if (endIndex === -1) endIndex = text.length;
            
            let block = text.substring(startIndex, endIndex);
            // strip header
            block = block.replace(/## u-\d+:.*?\n/, '').replace(/\*\*對應任務\*\*.*?\n/, '').replace(/\*\*對應素材\*\*.*?\n/, '').replace(/\*\*圖片需求.*?\n/, '').replace(/- `day1-u.*?\n/g, '');
            
            // Render markdown basic tags
            const box = document.getElementById(`lecture-${u.id}`);
            if (box) {
              clear(box);
              box.append(inlineMarkdown(block.trim()));
            }
          }
        });
      })
      .catch(err => {
        // Fallback description if fetch fails
        window.COURSE.day1.units.forEach(u => {
          const box = document.getElementById(`lecture-${u.id}`);
          if (box) {
            box.innerHTML = `<p>已成功生成簡報與教學配置！請直接在本地伺服器或開啟 <code>course-package/day1/content.md</code> 閱讀詳細單元內容。</p>`;
          }
        });
      });
  }

  /* ============================================================
   * Render Day Chapter
   * ============================================================ */
  function renderDay(dayId) {
    const d = window.COURSE[dayId];
    if (!d) return null;
    const root = el('section', { class: 'chapter', id: dayId });
    
    // Day hero
    const hero = el('div', { class: 'day-hero' });
    hero.append(el('div', { class: 'day-hero-numeral' }, 'D1'));
    const meta = el('div', { class: 'day-hero-meta' });
    meta.append(el('div', { class: 'day-hero-title' }, d.hero.title));
    meta.append(el('div', { class: 'day-hero-lead' }, d.hero.lead));
    hero.append(meta);
    root.append(hero);

    // Units
    d.units.forEach(u => {
      if (u.id === 'd1-u4') {
        root.append(renderDifyKnowledgeFlow());
      }
      root.append(renderUnit(d, u));
    });
    return root;
  }

  /* ============================================================
   * Render Materials overview
   * ============================================================ */
  function renderMaterials() {
    const root = el('section', { class: 'chapter', id: 'materials' });
    
    const header = el('header', {});
    header.append(el('span', { class: 'chapter-num' }, 'DOWNLOADS'));
    header.append(el('h2', {}, '教材與範本檔案總覽'));
    root.append(header);

    const mList = el('div', { class: 'materials' });
    window.COURSE.materials.forEach(m => mList.append(renderMaterialRow(m)));
    root.append(mList);

    return root;
  }

  /* ============================================================
   * Render Quiz
   * ============================================================ */
  function renderQuiz() {
    const root = el('section', { class: 'chapter', id: 'quiz' });
    
    const header = el('header', {});
    header.append(el('span', { class: 'chapter-num' }, 'ASSESSMENT'));
    header.append(el('h2', {}, '結訓與備課自我檢測'));
    root.append(header);

    const quizBox = el('div', { class: 'quiz-container', id: 'quizContainer' });
    root.append(quizBox);
    
    return root;
  }
    function renderQuizList() {
    const container = document.getElementById('quizContainer');
    if (!container) return;
    clear(container);

    const quiz = window.COURSE.quiz;
    
    // Render each question
    quiz.forEach((q, index) => {
      const qBox = el('div', { 
        class: 'quiz-question', 
        style: 'border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 24px;' 
      });
      qBox.append(el('div', { class: 'quiz-q-text' }, `問題 ${index + 1}：${q.question}`));
      
      const options = el('div', { class: 'quiz-options' });
      const feedbackId = `feedback-${index}`;
      
      q.options.forEach((opt, oIdx) => {
        const isSelected = state.quiz[index] === oIdx;
        const hasAnswered = state.quiz[index] != null;
        
        let optClass = 'quiz-option';
        if (hasAnswered) {
          if (oIdx === q.answer) optClass += ' correct';
          else if (isSelected) optClass += ' incorrect';
        } else if (isSelected) {
          optClass += ' selected';
        }

        const optEl = el('div', { 
          class: optClass,
          'data-question': index,
          'data-option': oIdx,
          onclick: () => {
            if (state.quiz[index] != null) return; // Answered already
            
            // Clear other selected styles for this question
            document.querySelectorAll(`.quiz-option[data-question="${index}"]`).forEach(o => o.classList.remove('selected'));
            optEl.classList.add('selected');
            
            // Save answer
            state.quiz[index] = oIdx;
            store.save(state);
            
            // Show single feedback
            showSingleQuizFeedback(index, q, oIdx);
            updateQuizScoreboard();
          }
         }, opt);
         options.append(optEl);
      });
      qBox.append(options);

      // Feedback area
      const feedbackBox = el('div', { id: feedbackId });
      qBox.append(feedbackBox);
      container.append(qBox);

      // If already answered, show feedback directly
      if (state.quiz[index] != null) {
        showSingleQuizFeedback(index, q, state.quiz[index]);
      }
    });

    // Score board
    const scoreBoard = el('div', { 
      id: 'quizScoreboard',
      class: 'quiz-score-board',
      style: 'margin-top: 32px; background: var(--surface-2); border-radius: var(--r-md); padding: 24px; border: 1px solid var(--border);'
    });
    container.append(scoreBoard);
    updateQuizScoreboard();
  }

  function showSingleQuizFeedback(index, q, userAns) {
    const feedbackBox = document.getElementById(`feedback-${index}`);
    if (!feedbackBox) return;
    clear(feedbackBox);

    const isCorrect = userAns === q.answer;
    
    // Highlight options styles
    document.querySelectorAll(`.quiz-option[data-question="${index}"]`).forEach((optEl, oIdx) => {
      if (oIdx === q.answer) {
        optEl.className = 'quiz-option correct';
      } else if (oIdx === userAns) {
        optEl.className = 'quiz-option incorrect';
      } else {
        optEl.className = 'quiz-option';
      }
    });

    if (isCorrect) {
      feedbackBox.append(el('div', { class: 'quiz-feedback correct', style: 'margin-top: 12px; color: var(--success); font-weight: bold;' }, '✓ 回答正確！太棒了！'));
    } else {
      const uId = q.sourceUnit.split('.')[1];
      const reviewLink = el('a', { href: 'javascript:;', onclick: () => scrollToSection(`day1-${uId}`) }, '複習此單元');
      const wrap = el('div', { class: 'quiz-feedback incorrect', style: 'margin-top: 12px; color: var(--danger); font-weight: bold;' });
      wrap.append(`✗ 回答錯誤。正確答案是：「${q.options[q.answer]}」。建議 `, reviewLink);
      feedbackBox.append(wrap);
    }
  }

  function updateQuizScoreboard() {
    const scoreBoard = document.getElementById('quizScoreboard');
    if (!scoreBoard) return;
    clear(scoreBoard);

    const quiz = window.COURSE.quiz;
    let answeredCount = 0;
    let correctCount = 0;

    quiz.forEach((q, index) => {
      const ans = state.quiz[index];
      if (ans != null) {
        answeredCount++;
        if (ans === q.answer) correctCount++;
      }
    });

    if (answeredCount === 0) {
      scoreBoard.innerHTML = `<div style="color: var(--muted); text-align: center;">請開始點選上方選項進行自我檢測</div>`;
      return;
    }

    const pct = Math.round((correctCount / quiz.length) * 100);
    
    scoreBoard.append(el('div', { style: 'font-size: 16px; font-weight: bold; margin-bottom: 8px;' }, '測驗進度與分數：'));
    scoreBoard.append(el('div', { class: 'quiz-score-num', style: 'font-size: 40px; font-weight: 700; color: var(--accent-2); line-height: 1.2;' }, `${pct} 分`));
    scoreBoard.append(el('div', { style: 'color: var(--muted); font-size: 13.5px; margin-top: 4px;' }, `答對題數：${correctCount} / ${quiz.length} (已完成 ${answeredCount} / ${quiz.length})`));

    if (answeredCount === quiz.length) {
      const resetBtn = el('button', { 
        class: 'quiz-btn',
        style: 'margin-top: 16px;',
        onclick: () => {
          state.quiz = {};
          store.save(state);
          renderQuizList();
        }
      }, '重新測驗');
      scoreBoard.append(resetBtn);
    }
  }


  /* ============================================================
   * Navigation and Progress UI
   * ============================================================ */
  function renderSidebar() {
    const nav = document.getElementById('nav');
    clear(nav);

    // Overview
    const ovLink = el('div', { class: 'nav-link active', 'data-target': 'overview', onclick: () => scrollToSection('overview') });
    ovLink.append(el('span', { class: 'nav-num' }, '00'), '工作坊總覽');
    nav.append(ovLink);

    // Shared Case
    const scLink = el('div', { class: 'nav-link', 'data-target': 'shared-case', onclick: () => scrollToSection('shared-case') });
    scLink.append(el('span', { class: 'nav-num' }, '★'), '共用實戰案例');
    nav.append(scLink);

    // Ecosystem
    const ecoLink = el('div', { class: 'nav-link', 'data-target': 'ecosystem', onclick: () => scrollToSection('ecosystem') });
    ecoLink.append(el('span', { class: 'nav-num' }, '❖'), '工具生態分工');
    nav.append(ecoLink);

    // Day units
    nav.append(el('div', { class: 'nav-section-title' }, '課程單元目錄'));
    window.COURSE.day1.units.forEach((u, i) => {
      if (u.id === 'd1-u4') {
        const flowLink = el('div', { class: 'nav-link', 'data-target': 'dify-flow', onclick: () => scrollToSection('dify-flow') });
        flowLink.append(el('span', { class: 'nav-num' }, '↧'), 'Dify 知識庫流程');
        nav.append(flowLink);
      }

      const link = el('div', { class: 'nav-link', 'data-target': `day1-${u.id}`, onclick: () => {
        scrollToSection(`day1-${u.id}`);
        // open accordion
        const det = document.getElementById(`day1-${u.id}`);
        if (det) det.open = true;
      }});
      link.append(el('span', { class: 'nav-num' }, `0${i+1}`), u.title);
      nav.append(link);
    });

    // Materials & Quiz
    nav.append(el('div', { class: 'nav-section-title' }, '輔助工具與評量'));
    
    const matLink = el('div', { class: 'nav-link', 'data-target': 'materials', onclick: () => scrollToSection('materials') });
    matLink.append(el('span', { class: 'nav-num' }, '⬇'), '教材素材總覽');
    nav.append(matLink);

    const quizLink = el('div', { class: 'nav-link', 'data-target': 'quiz', onclick: () => scrollToSection('quiz') });
    quizLink.append(el('span', { class: 'nav-num' }, '✍'), '課後自我檢測');
    nav.append(quizLink);
  }

  function updateProgressUI() {
    const tasks = window.COURSE.day1.units.flatMap(u => u.tasks);
    const total = tasks.length;
    const completed = tasks.filter(t => state.tasks[t.id]).length;
    const pct = total === 0 ? 0 : Math.round((completed / total) * 100);
    
    const fill = document.getElementById('progressFill');
    const val = document.getElementById('progressVal');
    if (fill) fill.style.width = `${pct}%`;
    if (val) val.textContent = `${pct}%`;
  }

  function initTheme() {
    const saved = localStorage.getItem('dify_workshop_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    
    document.getElementById('themeToggle').addEventListener('click', () => {
      const curr = document.documentElement.getAttribute('data-theme');
      const next = curr === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('dify_workshop_theme', next);
    });
  }

  /* ============================================================
   * Initialize Application
   * ============================================================ */
  function init() {
    const content = document.getElementById('content');
    clear(content);

    // Meta details in brand
    document.getElementById('brandProgram').textContent = window.COURSE.meta.metaInfo || '設計與時尚學院';
    document.getElementById('brandTitle').textContent = window.COURSE.meta.title;

    // Render chapters
    content.append(renderOverview(window.COURSE.meta));
    content.append(renderSharedCase(window.COURSE.sharedCase));
    content.append(renderEcosystem());
    content.append(renderDay('day1'));
    content.append(renderMaterials());
    content.append(renderQuiz());

    // Sidebar & Interactivity
    renderSidebar();
    updateProgressUI();
    initTheme();
    
    // Fetch content.md
    fetchAndPopulateLectures();

    // 渲染自我檢測測驗題庫
    renderQuizList();

    // Reset button
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm('確定要清除所有實作進度與測驗記錄嗎？')) {
        store.reset();
        state = store.load();
        userQuizAnswers = {};
        
        // Re-render tasks
        document.querySelectorAll('.task-item').forEach(item => {
          item.classList.remove('done');
        });
        
        window.COURSE.day1.units.forEach(u => {
          updateUnitProgressPill(u.id);
        });
        
        updateProgressUI();
        renderQuizList();
        scrollToSection('overview');
      }
    });

    // Close Modal event：✕ 按鈕、點遮罩空白處、ESC 皆可關閉
    document.getElementById('modalClose').addEventListener('click', closeMaterialModal);
    document.getElementById('materialModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('materialModal')) closeMaterialModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMaterialModal();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
